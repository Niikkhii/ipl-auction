<div class="login-icon">🏟️</div>
<h2>Team Login</h2>
<p>Select your team to join the live auction pool</p>

{% if error %}
<div class="login-error">{{ error }}</div>
{% endif %}

<form method="POST" action="/team/login">

  <div class="form-group">
    <label for="team_name">Select Team</label>

    <select name="team_name" id="team_name" required>
      <option value="">— Select Your Team —</option>

      {% for team in teams %}
      <option value="{{ team.name }}">
        {{ team.short_code }} — {{ team.name }}
      </option>
      {% endfor %}

    </select>
  </div>

  <button type="submit"
          class="btn btn-team"
          style="width:100%; margin-top:1rem;">
    🏟️ Join Auction
  </button>

</form>

<a href="/" class="back-link">← Back to home</a>
